<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Workflow Monitor - fVDB Training</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .header h1 {
            color: #667eea;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .upload-section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .upload-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-group label {
            font-weight: 600;
            color: #333;
        }
        
        .form-group input,
        .form-group select {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .upload-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .upload-btn:hover:not(:disabled) {
            transform: translateY(-2px);
        }
        
        .upload-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .workflow-monitor {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .stage {
            background: #f7f9fc;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #e0e0e0;
        }
        
        .stage.active {
            border-left-color: #667eea;
            background: #f0f4ff;
        }
        
        .stage.completed {
            border-left-color: #10b981;
            background: #f0fdf4;
        }
        
        .stage.error {
            border-left-color: #ef4444;
            background: #fef2f2;
        }
        
        .stage-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .stage-title {
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .status-badge.pending {
            background: #e0e0e0;
            color: #666;
        }
        
        .status-badge.active {
            background: #667eea;
            color: white;
        }
        
        .status-badge.completed {
            background: #10b981;
            color: white;
        }
        
        .status-badge.error {
            background: #ef4444;
            color: white;
        }
        
        .progress-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }
        
        .stage-details {
            color: #666;
            font-size: 0.95rem;
            margin-top: 8px;
        }
        
        .logs-section {
            background: #1e1e1e;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
        }
        
        .log-line {
            color: #d4d4d4;
            margin-bottom: 4px;
        }
        
        .log-line.error {
            color: #ff6b6b;
        }
        
        .log-line.success {
            color: #51cf66;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-left: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .summary-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
        }
        
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }
        
        .summary-item {
            text-align: center;
        }
        
        .summary-value {
            font-size: 2rem;
            font-weight: 700;
        }
        
        .summary-label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function WorkflowMonitor() {
            const [file, setFile] = useState(null);
            const [datasetId, setDatasetId] = useState('');
            const [fps, setFps] = useState(1.0);
            const [matcher, setMatcher] = useState('exhaustive');
            const [steps, setSteps] = useState(30000);
            const [uploading, setUploading] = useState(false);
            const [workflowId, setWorkflowId] = useState(null);
            const [workflowStatus, setWorkflowStatus] = useState(null);
            const [logs, setLogs] = useState([]);
            const [activeWorkflows, setActiveWorkflows] = useState([]);
            const pollInterval = useRef(null);

            // Auto-detect active workflows on page load
            useEffect(() => {
                checkForActiveWorkflows();
                const checkInterval = setInterval(checkForActiveWorkflows, 5000);
                return () => clearInterval(checkInterval);
            }, []);

            useEffect(() => {
                if (workflowId) {
                    pollInterval.current = setInterval(fetchStatus, 3000);
                    return () => clearInterval(pollInterval.current);
                }
            }, [workflowId]);

            const checkForActiveWorkflows = async () => {
                try {
                    const response = await fetch('http://localhost:8003/workflow/list');
                    const data = await response.json();
                    const workflows = data.workflows || [];
                    setActiveWorkflows(workflows);
                    
                    // Auto-select the most recent active workflow if we don't have one
                    if (!workflowId && workflows.length > 0) {
                        const activeWf = workflows.find(w => w.status !== 'completed' && w.status !== 'failed');
                        if (activeWf) {
                            setWorkflowId(activeWf.workflow_id);
                            setDatasetId(activeWf.dataset_id);
                            setLogs([`[${new Date().toLocaleTimeString()}] Auto-detected active workflow: ${activeWf.workflow_id}`]);
                        }
                    }
                } catch (error) {
                    console.error('Error checking workflows:', error);
                }
            };

            const fetchStatus = async () => {
                try {
                    const colmapRes = await fetch(`http://localhost:8003/workflow/status/${workflowId}`);
                    const colmapData = await colmapRes.json();
                    
                    setWorkflowStatus(colmapData);
                    
                    // Add log entry
                    const newLog = `[${new Date().toLocaleTimeString()}] ${colmapData.current_step}`;
                    setLogs(prev => [...prev.slice(-50), newLog]);
                    
                    // If training started, also poll training service
                    if (colmapData.training_job_id) {
                        const trainRes = await fetch('http://localhost:8000/jobs');
                        const trainData = await trainRes.json();
                        const trainJob = trainData.jobs.find(j => j.job_id === colmapData.training_job_id);
                        if (trainJob) {
                            setWorkflowStatus({...colmapData, trainingDetails: trainJob});
                        }
                    }
                } catch (error) {
                    console.error('Error fetching status:', error);
                }
            };

            const handleUpload = async (e) => {
                e.preventDefault();
                if (!file || !datasetId) {
                    alert('Please select a file and enter a dataset ID');
                    return;
                }

                setUploading(true);
                setLogs([]);

                const formData = new FormData();
                formData.append('file', file);
                formData.append('dataset_id', datasetId);
                formData.append('fps', fps);
                formData.append('camera_model', 'SIMPLE_RADIAL');
                formData.append('matcher', matcher);
                formData.append('num_training_steps', steps);

                try {
                    const response = await fetch('http://localhost:8003/workflow/video-to-model', {
                        method: 'POST',
                        body: formData
                    });

                    const data = await response.json();
                    if (data.workflow_id) {
                        setWorkflowId(data.workflow_id);
                        setLogs([`[${new Date().toLocaleTimeString()}] Workflow started: ${data.workflow_id}`]);
                    } else {
                        // If no workflow_id returned, wait and check for active workflows
                        setLogs([`[${new Date().toLocaleTimeString()}] Upload initiated, checking for workflow...`]);
                        setTimeout(() => {
                            checkForActiveWorkflows();
                        }, 3000);
                    }
                } catch (error) {
                    alert('Upload failed: ' + error.message);
                    setUploading(false);
                }
            };

            const getStageStatus = (stage) => {
                if (!workflowStatus) return 'pending';
                
                const progress = workflowStatus.progress || 0;
                const status = workflowStatus.status;
                
                if (stage === 'upload' && progress >= 0.1) return 'completed';
                if (stage === 'extract' && progress >= 0.3) return 'completed';
                if (stage === 'colmap' && progress >= 0.7) return 'completed';
                if (stage === 'training' && status === 'completed') return 'completed';
                
                if (stage === 'upload' && progress < 0.1 && status !== 'failed') return 'active';
                if (stage === 'extract' && progress >= 0.1 && progress < 0.3) return 'active';
                if (stage === 'colmap' && progress >= 0.3 && progress < 0.7) return 'active';
                if (stage === 'training' && progress >= 0.7 && status !== 'completed') return 'active';
                
                if (status === 'failed') return 'error';
                return 'pending';
            };

            const getOverallProgress = () => {
                return workflowStatus ? Math.round(workflowStatus.progress * 100) : 0;
            };

            return (
                <div className="container">
                    <div className="header">
                        <h1>🚀 Complete Workflow Monitor</h1>
                        <p>Upload video → Extract frames → COLMAP → Train → Download Model</p>
                    </div>

                    <div className="upload-section">
                        <h2 style={{marginBottom: '20px'}}>Start New Workflow</h2>
                        <form className="upload-form" onSubmit={handleUpload}>
                            <div className="form-group">
                                <label>Video File (MP4, MOV, AVI)</label>
                                <input 
                                    type="file" 
                                    accept="video/*" 
                                    onChange={(e) => setFile(e.target.files[0])}
                                    disabled={uploading}
                                />
                            </div>
                            
                            <div className="form-group">
                                <label>Dataset ID (unique name)</label>
                                <input 
                                    type="text" 
                                    value={datasetId}
                                    onChange={(e) => setDatasetId(e.target.value)}
                                    placeholder="e.g., tesla_model_s"
                                    disabled={uploading}
                                />
                            </div>
                            
                            <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '15px'}}>
                                <div className="form-group">
                                    <label>FPS (frames per second)</label>
                                    <input 
                                        type="number" 
                                        value={fps}
                                        onChange={(e) => setFps(parseFloat(e.target.value))}
                                        step="0.5"
                                        min="0.5"
                                        max="5"
                                        disabled={uploading}
                                    />
                                </div>
                                
                                <div className="form-group">
                                    <label>Matcher</label>
                                    <select value={matcher} onChange={(e) => setMatcher(e.target.value)} disabled={uploading}>
                                        <option value="exhaustive">Exhaustive</option>
                                        <option value="sequential">Sequential</option>
                                    </select>
                                </div>
                                
                                <div className="form-group">
                                    <label>Training Steps</label>
                                    <input 
                                        type="number" 
                                        value={steps}
                                        onChange={(e) => setSteps(parseInt(e.target.value))}
                                        step="1000"
                                        min="10000"
                                        max="50000"
                                        disabled={uploading}
                                    />
                                </div>
                            </div>
                            
                            <button type="submit" className="upload-btn" disabled={uploading}>
                                {uploading ? '🔄 Processing...' : '🚀 Start Complete Workflow'}
                            </button>
                        </form>
                    </div>

                    {activeWorkflows.length > 0 && !workflowStatus && (
                        <div className="upload-section">
                            <h2 style={{marginBottom: '15px'}}>🔍 Active Workflows Detected</h2>
                            {activeWorkflows.map(wf => (
                                <div key={wf.workflow_id} style={{
                                    padding: '15px',
                                    background: '#f0f4ff',
                                    borderRadius: '8px',
                                    marginBottom: '10px',
                                    cursor: 'pointer',
                                    border: workflowId === wf.workflow_id ? '2px solid #667eea' : '2px solid transparent'
                                }} onClick={() => setWorkflowId(wf.workflow_id)}>
                                    <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                                        <div>
                                            <strong>{wf.dataset_id}</strong>
                                            <div style={{fontSize: '0.85rem', color: '#666', marginTop: '4px'}}>
                                                {wf.workflow_id}
                                            </div>
                                        </div>
                                        <span className={`status-badge ${wf.status === 'completed' ? 'completed' : wf.status === 'failed' ? 'error' : 'active'}`}>
                                            {wf.status}
                                        </span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {workflowStatus && (
                        <>
                            <div className="summary-card">
                                <h2>Workflow Progress</h2>
                                <div className="summary-grid">
                                    <div className="summary-item">
                                        <div className="summary-value">{getOverallProgress()}%</div>
                                        <div className="summary-label">Overall Progress</div>
                                    </div>
                                    <div className="summary-item">
                                        <div className="summary-value">{workflowStatus.status?.toUpperCase() || 'N/A'}</div>
                                        <div className="summary-label">Status</div>
                                    </div>
                                    <div className="summary-item">
                                        <div className="summary-value">{workflowStatus.dataset_id || 'N/A'}</div>
                                        <div className="summary-label">Dataset</div>
                                    </div>
                                    <div className="summary-item">
                                        <div className="summary-value">
                                            {workflowStatus.trainingDetails?.num_training_steps || steps}
                                        </div>
                                        <div className="summary-label">Training Steps</div>
                                    </div>
                                </div>
                            </div>

                            <div className="workflow-monitor">
                                <h2 style={{marginBottom: '20px'}}>Pipeline Stages</h2>
                                
                                {/* Stage 1: Upload */}
                                <div className={`stage ${getStageStatus('upload')}`}>
                                    <div className="stage-header">
                                        <div className="stage-title">
                                            📤 Upload Video
                                            {getStageStatus('upload') === 'active' && <div className="spinner"></div>}
                                        </div>
                                        <span className={`status-badge ${getStageStatus('upload')}`}>
                                            {getStageStatus('upload')}
                                        </span>
                                    </div>
                                    {workflowStatus.progress >= 0.1 && (
                                        <div className="stage-details">Video uploaded successfully</div>
                                    )}
                                </div>

                                {/* Stage 2: Extract Frames */}
                                <div className={`stage ${getStageStatus('extract')}`}>
                                    <div className="stage-header">
                                        <div className="stage-title">
                                            🎬 Extract Frames
                                            {getStageStatus('extract') === 'active' && <div className="spinner"></div>}
                                        </div>
                                        <span className={`status-badge ${getStageStatus('extract')}`}>
                                            {getStageStatus('extract')}
                                        </span>
                                    </div>
                                    {workflowStatus.progress >= 0.2 && (
                                        <div className="stage-details">
                                            Extracting frames at {fps} FPS...
                                        </div>
                                    )}
                                </div>

                                {/* Stage 3: COLMAP */}
                                <div className={`stage ${getStageStatus('colmap')}`}>
                                    <div className="stage-header">
                                        <div className="stage-title">
                                            📐 COLMAP Reconstruction
                                            {getStageStatus('colmap') === 'active' && <div className="spinner"></div>}
                                        </div>
                                        <span className={`status-badge ${getStageStatus('colmap')}`}>
                                            {getStageStatus('colmap')}
                                        </span>
                                    </div>
                                    {workflowStatus.progress >= 0.3 && workflowStatus.progress < 0.7 && (
                                        <div className="progress-bar">
                                            <div className="progress-fill" style={{width: `${(workflowStatus.progress - 0.3) / 0.4 * 100}%`}}></div>
                                        </div>
                                    )}
                                    {workflowStatus.current_step && workflowStatus.progress < 0.7 && (
                                        <div className="stage-details">{workflowStatus.current_step}</div>
                                    )}
                                </div>

                                {/* Stage 4: Training */}
                                <div className={`stage ${getStageStatus('training')}`}>
                                    <div className="stage-header">
                                        <div className="stage-title">
                                            🎓 Gaussian Splat Training
                                            {getStageStatus('training') === 'active' && <div className="spinner"></div>}
                                        </div>
                                        <span className={`status-badge ${getStageStatus('training')}`}>
                                            {getStageStatus('training')}
                                        </span>
                                    </div>
                                    {workflowStatus.trainingDetails && (
                                        <>
                                            <div className="progress-bar">
                                                <div className="progress-fill" style={{width: `${workflowStatus.trainingDetails.progress * 100}%`}}></div>
                                            </div>
                                            <div className="stage-details">
                                                {workflowStatus.trainingDetails.message}
                                            </div>
                                        </>
                                    )}
                                    {workflowStatus.status === 'completed' && (
                                        <div className="stage-details">
                                            ✅ Training complete! Output files ready for download.
                                        </div>
                                    )}
                                </div>

                                {/* Logs */}
                                <div className="logs-section">
                                    <strong style={{color: '#d4d4d4', marginBottom: '10px', display: 'block'}}>📋 Live Logs</strong>
                                    {logs.map((log, i) => (
                                        <div key={i} className="log-line">{log}</div>
                                    ))}
                                </div>
                            </div>
                        </>
                    )}
                </div>
            );
        }

        ReactDOM.render(<WorkflowMonitor />, document.getElementById('root'));
    </script>
</body>
</html>
