<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRELLIS.2 3D Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            overflow: hidden;
            height: 100vh;
        }
        #app { display: flex; height: 100vh; }

        /* 3D Viewport */
        #viewport {
            flex: 1;
            position: relative;
            background: radial-gradient(ellipse at center, #1a1f2e 0%, #0d1117 70%);
        }
        #viewport canvas { display: block; width: 100%; height: 100%; }
        #loading-overlay {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: rgba(13, 17, 23, 0.9);
            z-index: 10;
        }
        .spinner {
            width: 48px; height: 48px;
            border: 4px solid rgba(139, 92, 246, 0.3);
            border-top-color: #8b5cf6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading-text { margin-top: 16px; color: #8b8b8b; font-size: 0.95rem; }
        #progress-bar-wrap {
            width: 240px; height: 4px; background: #21262d;
            border-radius: 2px; margin-top: 12px; overflow: hidden;
        }
        #progress-bar {
            height: 100%; width: 0%; border-radius: 2px;
            background: linear-gradient(90deg, #667eea, #8b5cf6);
            transition: width 0.4s;
        }

        /* Toolbar */
        #toolbar {
            position: absolute; top: 12px; left: 12px;
            display: flex; gap: 8px; z-index: 5;
        }
        .tool-btn {
            background: rgba(30, 35, 50, 0.85);
            border: 1px solid rgba(139, 92, 246, 0.3);
            color: #c9d1d9; padding: 8px 14px;
            border-radius: 8px; cursor: pointer;
            font-size: 0.85rem; backdrop-filter: blur(8px);
            transition: all 0.2s;
        }
        .tool-btn:hover { background: rgba(139, 92, 246, 0.25); color: #fff; }
        .tool-btn.active { background: rgba(139, 92, 246, 0.4); border-color: #8b5cf6; color: #fff; }

        /* Status badge */
        #status-badge {
            position: absolute; bottom: 12px; left: 12px;
            background: rgba(30, 35, 50, 0.85);
            border: 1px solid rgba(139, 92, 246, 0.3);
            padding: 8px 14px; border-radius: 8px;
            font-size: 0.8rem; color: #8b8b8b;
            backdrop-filter: blur(8px); z-index: 5;
        }

        /* Side Panel */
        #panel {
            width: 340px; background: #161b22;
            border-left: 1px solid #30363d;
            display: flex; flex-direction: column;
            overflow-y: auto;
        }
        .panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid #30363d;
            background: linear-gradient(135deg, #1a1040 0%, #161b22 100%);
        }
        .panel-header h2 {
            font-size: 1.1rem; font-weight: 600;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .panel-header p { font-size: 0.8rem; color: #8b949e; margin-top: 4px; }

        .panel-section {
            padding: 16px 20px;
            border-bottom: 1px solid #21262d;
        }
        .panel-section h3 {
            font-size: 0.85rem; font-weight: 600;
            color: #8b949e; text-transform: uppercase;
            letter-spacing: 0.05em; margin-bottom: 10px;
        }

        .field-group { margin-bottom: 12px; }
        .field-group label {
            display: block; font-size: 0.8rem;
            color: #8b949e; margin-bottom: 4px;
        }
        .field-group input, .field-group textarea {
            width: 100%; padding: 8px 10px;
            background: #0d1117; border: 1px solid #30363d;
            border-radius: 6px; color: #e6edf3;
            font-size: 0.85rem; font-family: inherit;
        }
        .field-group input:focus, .field-group textarea:focus {
            outline: none; border-color: #8b5cf6;
        }
        .field-group textarea { resize: vertical; min-height: 80px; }

        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 16px; border-radius: 6px;
            font-size: 0.85rem; cursor: pointer;
            border: none; font-weight: 500;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #8b5cf6);
            color: #fff;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-secondary {
            background: #21262d; color: #c9d1d9;
            border: 1px solid #30363d;
        }
        .btn-secondary:hover { background: #30363d; }
        .btn-danger {
            background: #da3633; color: #fff;
        }

        .file-list { margin-top: 8px; }
        .file-item {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 8px; background: #0d1117;
            border-radius: 4px; margin-bottom: 4px;
            font-size: 0.8rem; color: #8b949e;
        }
        .file-item a { color: #8b5cf6; text-decoration: none; }
        .file-item a:hover { text-decoration: underline; }

        /* Source info */
        .source-info {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 12px; background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 8px; font-size: 0.8rem;
        }

        /* Input image preview */
        #input-preview {
            width: 100%; border-radius: 8px;
            border: 1px solid #30363d;
            margin-top: 8px;
        }

        /* Actions */
        .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    </style>
</head>
<body>
    <div id="app">
        <!-- 3D Viewport -->
        <div id="viewport">
            <div id="loading-overlay">
                <div class="spinner"></div>
                <div id="loading-text">Loading 3D model...</div>
                <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
            </div>

            <div id="toolbar">
                <button class="tool-btn active" id="autoRotateBtn" onclick="toggleAutoRotate()">
                    🔄 Auto-Rotate
                </button>
                <button class="tool-btn" onclick="resetCamera()">🎯 Reset View</button>
                <button class="tool-btn" onclick="toggleWireframe()">🔲 Wireframe</button>
                <button class="tool-btn" onclick="downloadGlb()">💾 Download GLB</button>
            </div>

            <div id="status-badge">
                <span id="status-text">Initializing...</span>
            </div>
        </div>

        <!-- Side Panel -->
        <div id="panel">
            <div class="panel-header">
                <h2>TRELLIS.2 Reconstruction</h2>
                <p>Job: <code id="jobIdDisplay">{{JOB_ID}}</code></p>
            </div>

            <!-- Job Status -->
            <div class="panel-section" id="jobStatusSection">
                <h3>Status</h3>
                <div id="jobStatus" style="font-size: 0.9rem;">Checking...</div>
            </div>

            <!-- Source Info -->
            <div class="panel-section" id="sourceSection" style="display: none;">
                <h3>Source</h3>
                <div class="source-info">
                    <span>🎯</span>
                    <span>From GARField extraction: <strong id="sourceJobId"></strong></span>
                </div>
                <img id="input-preview" style="display: none;" alt="Input image">
            </div>

            <!-- Metadata -->
            <div class="panel-section">
                <h3>Metadata</h3>
                <div class="field-group">
                    <label>Label</label>
                    <input type="text" id="metaLabel" placeholder="e.g., Drone antenna array">
                </div>
                <div class="field-group">
                    <label>Description / Notes</label>
                    <textarea id="metaText" placeholder="Add notes, specs, or description for this 3D asset..."></textarea>
                </div>
                <button class="btn btn-primary" onclick="saveMetadata()">💾 Save Metadata</button>
            </div>

            <!-- Document Upload -->
            <div class="panel-section">
                <h3>Documents</h3>
                <p style="font-size: 0.8rem; color: #8b949e; margin-bottom: 8px;">
                    Upload specs, datasheets, or reference documents
                </p>
                <input type="file" id="fileUpload" multiple
                       style="font-size: 0.8rem; color: #8b949e; margin-bottom: 8px;">
                <button class="btn btn-secondary" onclick="uploadFiles()">📎 Upload Files</button>
                <div class="file-list" id="fileList"></div>
            </div>

            <!-- Actions -->
            <div class="panel-section">
                <h3>Actions</h3>
                <div class="actions">
                    <button class="btn btn-secondary" onclick="downloadGlb()">💾 Download GLB</button>
                    <button class="btn btn-danger" onclick="deleteJob()">🗑️ Delete</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Three.js from CDN -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

        const JOB_ID = '{{JOB_ID}}';
        const API_BASE = window.location.origin;

        let scene, camera, renderer, controls, model;
        let autoRotate = true;
        let wireframeMode = false;

        // ===== Scene Setup =====
        function initScene() {
            const viewport = document.getElementById('viewport');
            const w = viewport.clientWidth;
            const h = viewport.clientHeight;

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(w, h);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            viewport.appendChild(renderer.domElement);

            // Scene
            scene = new THREE.Scene();

            // Camera
            camera = new THREE.PerspectiveCamera(45, w / h, 0.01, 100);
            camera.position.set(2, 1.5, 2);

            // Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.08;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 1.5;
            controls.minDistance = 0.3;
            controls.maxDistance = 20;
            controls.target.set(0, 0, 0);
            controls.update();

            // Lighting - PBR-friendly setup
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
            dirLight.position.set(5, 8, 5);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.set(2048, 2048);
            scene.add(dirLight);

            const fillLight = new THREE.DirectionalLight(0x8888ff, 0.3);
            fillLight.position.set(-3, 2, -5);
            scene.add(fillLight);

            const rimLight = new THREE.DirectionalLight(0xffffff, 0.5);
            rimLight.position.set(0, -3, -5);
            scene.add(rimLight);

            // Ground grid
            const gridHelper = new THREE.GridHelper(4, 20, 0x303050, 0x202035);
            gridHelper.position.y = -0.5;
            scene.add(gridHelper);

            // Resize handler
            window.addEventListener('resize', () => {
                const w = viewport.clientWidth;
                const h = viewport.clientHeight;
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // ===== Model Loading =====
        async function loadModel() {
            const loader = new GLTFLoader();

            // Optional Draco decoder for compressed GLBs
            const dracoLoader = new DRACOLoader();
            dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/libs/draco/');
            loader.setDRACOLoader(dracoLoader);

            try {
                const gltf = await new Promise((resolve, reject) => {
                    loader.load(
                        `${API_BASE}/download/${JOB_ID}`,
                        resolve,
                        (progress) => {
                            if (progress.total > 0) {
                                const pct = Math.round((progress.loaded / progress.total) * 100);
                                document.getElementById('progress-bar').style.width = pct + '%';
                                document.getElementById('loading-text').textContent =
                                    `Loading model... ${pct}%`;
                            }
                        },
                        reject
                    );
                });

                model = gltf.scene;

                // Center and scale model
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = 2.0 / maxDim;

                model.position.sub(center);
                model.scale.setScalar(scale);

                // Enable shadows on all meshes
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                scene.add(model);

                // Adjust camera to fit
                controls.target.set(0, 0, 0);
                camera.position.set(1.8, 1.2, 1.8);
                controls.update();

                document.getElementById('loading-overlay').style.display = 'none';
                updateStatus(`Model loaded • ${countVertices(model)} vertices`);

            } catch (err) {
                console.error('Failed to load GLB:', err);
                document.getElementById('loading-text').textContent =
                    'Failed to load model. It may still be generating.';
                document.getElementById('progress-bar').style.width = '0%';
            }
        }

        function countVertices(obj) {
            let count = 0;
            obj.traverse((child) => {
                if (child.isMesh && child.geometry) {
                    count += child.geometry.attributes.position?.count || 0;
                }
            });
            return count.toLocaleString();
        }

        // ===== Toolbar Actions =====
        window.toggleAutoRotate = function() {
            autoRotate = !autoRotate;
            controls.autoRotate = autoRotate;
            const btn = document.getElementById('autoRotateBtn');
            btn.classList.toggle('active', autoRotate);
        };

        window.resetCamera = function() {
            camera.position.set(1.8, 1.2, 1.8);
            controls.target.set(0, 0, 0);
            controls.update();
        };

        window.toggleWireframe = function() {
            wireframeMode = !wireframeMode;
            if (model) {
                model.traverse((child) => {
                    if (child.isMesh && child.material) {
                        if (Array.isArray(child.material)) {
                            child.material.forEach(m => m.wireframe = wireframeMode);
                        } else {
                            child.material.wireframe = wireframeMode;
                        }
                    }
                });
            }
        };

        window.downloadGlb = function() {
            window.open(`${API_BASE}/download/${JOB_ID}`, '_blank');
        };

        window.deleteJob = async function() {
            if (!confirm('Delete this reconstruction and all files?')) return;
            await fetch(`${API_BASE}/jobs/${JOB_ID}`, { method: 'DELETE' });
            window.close();
        };

        function updateStatus(text) {
            document.getElementById('status-text').textContent = text;
        }

        // ===== Job Status Polling =====
        async function pollJobStatus() {
            try {
                const resp = await fetch(`${API_BASE}/jobs/${JOB_ID}`);
                const job = await resp.json();

                const statusEl = document.getElementById('jobStatus');

                if (job.status === 'completed') {
                    statusEl.innerHTML = `<span style="color:#3fb950;">✅ Complete</span>`;
                    loadModel();

                    // Show source info
                    if (job.source_job_id) {
                        document.getElementById('sourceSection').style.display = 'block';
                        document.getElementById('sourceJobId').textContent = job.source_job_id;
                    }

                    // Show input image
                    const imgEl = document.getElementById('input-preview');
                    imgEl.src = `${API_BASE}/input_image/${JOB_ID}`;
                    imgEl.style.display = 'block';

                    // Load existing metadata
                    loadMetadata();
                    return;

                } else if (job.status === 'failed') {
                    statusEl.innerHTML = `<span style="color:#f85149;">❌ Failed: ${job.error || 'Unknown'}</span>`;
                    document.getElementById('loading-text').textContent = 'Reconstruction failed';
                    return;

                } else {
                    const pct = Math.round((job.progress || 0) * 100);
                    statusEl.innerHTML = `
                        <span style="color:#d29922;">⏳ ${job.current_step || job.status}</span>
                        <div style="background:#21262d;height:4px;border-radius:2px;margin-top:6px;">
                            <div style="background:linear-gradient(90deg,#667eea,#8b5cf6);height:100%;width:${pct}%;border-radius:2px;transition:width 0.4s;"></div>
                        </div>`;
                    document.getElementById('loading-text').textContent = job.current_step || 'Processing...';
                    document.getElementById('progress-bar').style.width = pct + '%';
                }

                // Keep polling
                setTimeout(pollJobStatus, 2000);

            } catch (err) {
                console.error('Status poll error:', err);
                setTimeout(pollJobStatus, 5000);
            }
        }

        // ===== Metadata =====
        async function loadMetadata() {
            try {
                const resp = await fetch(`${API_BASE}/metadata/${JOB_ID}`);
                const data = await resp.json();
                if (data.metadata) {
                    document.getElementById('metaLabel').value = data.metadata.label || '';
                    document.getElementById('metaText').value = data.metadata.text || '';
                    updateFileList(data.metadata.files || []);
                }
            } catch (e) { console.error('Load metadata error:', e); }
        }

        window.saveMetadata = async function() {
            const formData = new FormData();
            formData.append('job_id', JOB_ID);
            formData.append('text', document.getElementById('metaText').value);
            formData.append('label', document.getElementById('metaLabel').value);
            try {
                await fetch(`${API_BASE}/metadata`, { method: 'POST', body: formData });
                updateStatus('Metadata saved');
            } catch (e) { console.error('Save metadata error:', e); }
        };

        window.uploadFiles = async function() {
            const fileInput = document.getElementById('fileUpload');
            if (!fileInput.files.length) return;
            const formData = new FormData();
            formData.append('job_id', JOB_ID);
            for (const f of fileInput.files) formData.append('files', f);
            try {
                const resp = await fetch(`${API_BASE}/metadata/upload`, { method: 'POST', body: formData });
                const data = await resp.json();
                if (data.uploaded) {
                    updateFileList(data.uploaded.map((u, i) => ({ idx: i, name: u.name, size: u.size })));
                    updateStatus(`${data.uploaded.length} file(s) uploaded`);
                }
            } catch (e) { console.error('Upload error:', e); }
            fileInput.value = '';
        };

        function updateFileList(files) {
            const el = document.getElementById('fileList');
            if (!files || files.length === 0) { el.innerHTML = ''; return; }
            el.innerHTML = files.map(f =>
                `<div class="file-item">
                    📎 <a href="${API_BASE}/metadata/${JOB_ID}/file/${f.idx}" target="_blank">${f.name}</a>
                    <span style="margin-left:auto;">${f.size || ''}</span>
                </div>`
            ).join('');
        }

        // ===== Initialize =====
        initScene();
        pollJobStatus();
    </script>
</body>
</html>
