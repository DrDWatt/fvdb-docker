# =============================================================================
# fVDB GAUSSIAN SPLATTING PLATFORM - MASTER DOCKER COMPOSE
# =============================================================================
# This file starts ALL services for a complete fVDB deployment.
# 
# Usage:
#   docker compose -f docker-compose.master.yml up -d
#
# Prerequisites:
#   - NVIDIA GPU with CUDA support
#   - Docker with NVIDIA Container Toolkit
#   - At least 16GB VRAM recommended for all services
#
# Service Ports:
#   8085 - Viewer (main UI)
#   8000 - Training
#   8001 - Rendering
#   8002 - USD Pipeline
#   8003 - COLMAP
#   8004 - SAM-2 Segmentation
#   8006 - GARField Extraction
#   8009 - SVO to ROSBAG Converter
#   8010 - ISAAC Sim
#   8011 - ISAAC Lab
#   8012 - ISAAC Viewer
#   8090 - Streaming Server
#   8013 - TRELLIS.2 3D Reconstruction
# =============================================================================

services:
  # ===========================================================================
  # MODEL DOWNLOADER - Downloads required AI models on first run
  # ===========================================================================
  model-downloader:
    image: curlimages/curl:latest
    container_name: model-downloader
    volumes:
      - ./sam2-data/models:/models/sam2
      - ./cache/torch:/cache/torch
      - ./models:/models/splat
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "=== fVDB Model Downloader ==="
        mkdir -p /models/sam2
        SAM2_PATH="/models/sam2/sam2_hiera_large.pt"
        if [ ! -f "$SAM2_PATH" ]; then
          echo "Downloading SAM-2 model (2.4GB)..."
          curl -L -o "$SAM2_PATH" "https://dl.fbaipublicfiles.com/segment_anything_2/072824/sam2_hiera_large.pt"
          echo "SAM-2 download complete"
        else
          echo "SAM-2 model already exists"
        fi
        echo "=== Model download complete ==="
    networks:
      - workflow-net

  # ===========================================================================
  # COLMAP SERVICE - Structure from Motion / Camera Pose Estimation
  # Swagger: http://localhost:8003/docs
  # ===========================================================================
  colmap-service:
    build:
      context: ./colmap-service
      dockerfile: Dockerfile
    image: colmap-service:latest
    container_name: colmap-processor
    ports:
      - "8003:8003"
    volumes:
      - ./colmap-data/uploads:/app/uploads
      - ./colmap-data/processing:/app/processing
      - ./colmap-data/outputs:/app/outputs
      - ./colmap-data/temp:/app/temp
      - ./colmap-service/colmap_service.py:/app/colmap_service.py:ro
      - ./colmap-service/splatking_parser.py:/app/splatking_parser.py:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    runtime: nvidia
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - workflow-net

  # ===========================================================================
  # TRAINING SERVICE - Gaussian Splat Training (Video/Photos → PLY)
  # Swagger: http://localhost:8000/api
  # ===========================================================================
  training-service:
    image: fvdb-training-gpu:latest
    container_name: fvdb-training-gpu
    runtime: nvidia
    command: ["python3", "-m", "uvicorn", "training_service:app", "--host", "0.0.0.0", "--port", "8000"]
    shm_size: '8gb'
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - CUDA_VISIBLE_DEVICES=0
      - PYTHONPATH=/fvdb-reality-capture:/host-fvdb/lib/python3.12/site-packages:/app
      - PATH=/host-fvdb/bin:/usr/local/cuda-13.0/bin:/usr/local/bin:/usr/bin:/bin
      - LD_LIBRARY_PATH=/host-fvdb/lib/python3.12/site-packages/nvidia/cuda_runtime/lib:/host-fvdb/lib/python3.12/site-packages/nvidia/cublas/lib:/host-fvdb/lib/python3.12/site-packages/nvidia/cudnn/lib:/usr/local/cuda-13.0/lib64:/usr/local/nvidia/lib:/usr/local/nvidia/lib64
      - CUDA_HOME=/usr/local/cuda-13.0
      - TORCH_CUDA_ARCH_LIST=12.1
      - SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt
      - TORCH_HOME=/app/.cache/torch
    ports:
      - "8000:8000"
    volumes:
      - /home/dwatkins3/miniforge3/envs/fvdb:/host-fvdb:ro
      - /home/dwatkins3/fvdb-reality-capture:/fvdb-reality-capture:ro
      - /usr/local/cuda-13.0:/usr/local/cuda-13.0:ro
      - ./colmap-data/outputs:/app/data
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
      - ./models:/app/models
      - ./cache/torch:/app/.cache/torch
      - ./training-service/training_service.py:/app/training_service.py:ro
      - ./training-service/train_subprocess.py:/app/train_subprocess.py:ro
      - ./training-service/clean_gaussians.py:/app/clean_gaussians.py:ro
      - ./training-service/extract_frames.py:/app/extract_frames.py:ro
      - ./training-service/static:/app/static:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    depends_on:
      model-downloader:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - workflow-net

  # ===========================================================================
  # RENDERING SERVICE - PLY Model Management & Rendering
  # Swagger: http://localhost:8001/api
  # ===========================================================================
  rendering-service:
    image: fvdb-rendering-minimal:latest
    container_name: fvdb-rendering
    ports:
      - "8001:8001"
    volumes:
      - ./models:/app/models
      - ./rendering-service/rendering_service_clean.py:/app/rendering_service.py:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - workflow-net

  # ===========================================================================
  # USD PIPELINE - PLY to USD Conversion for Omniverse
  # Swagger: http://localhost:8002/api
  # ===========================================================================
  usd-pipeline:
    image: fvdb-docker-usd-pipeline:latest
    container_name: usd-pipeline
    ports:
      - "8002:8002"
    volumes:
      - ./models:/app/models
      - ./usd-outputs:/app/outputs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - workflow-net

  # ===========================================================================
  # SAM-2 SERVICE - Segment Anything Model 2 for Object Segmentation
  # Swagger: http://localhost:8004/docs
  # ===========================================================================
  sam2-service:
    build:
      context: ./sam2-service
      dockerfile: Dockerfile
    image: sam2-service:latest
    container_name: sam2-segmentation
    ports:
      - "8004:8004"
    volumes:
      - ./sam2-data/uploads:/app/uploads
      - ./sam2-data/outputs:/app/outputs
      - ./sam2-data/models:/app/models/sam2
      - ./sam2-data/cache:/app/cache
      - ./models:/app/splat-models:ro
      - ./sam2-service/sam2_service.py:/app/sam2_service.py:ro
      - ./sam2-service/static:/app/static:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - CUDA_VISIBLE_DEVICES=0
      - TORCH_HOME=/app/cache
      - SAM2_CHECKPOINT_DIR=/app/models/sam2
      - VIEWER_SERVICE_URL=http://fvdb-viewer:8085
      - TRAINING_SERVICE_URL=http://fvdb-training-gpu:8000
      - RENDERING_SERVICE_URL=http://fvdb-rendering:8001
    runtime: nvidia
    restart: unless-stopped
    depends_on:
      model-downloader:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - workflow-net

  # ===========================================================================
  # FVDB VIEWER - Interactive 3D Gaussian Splat Viewer with Segmentation
  # Swagger: http://localhost:8085/docs
  # ===========================================================================
  fvdb-viewer:
    image: fvdb-training-gpu:latest
    container_name: fvdb-viewer
    runtime: nvidia
    ports:
      - "8085:8085"
    volumes:
      - /home/dwatkins3/miniforge3/envs/fvdb:/host-fvdb:ro
      - /usr/local/cuda-13.0:/usr/local/cuda-13.0:ro
      - ./models:/app/models
      - ./sam2-data/models:/app/sam2-models:ro
      - ./fvdb-viewer/image_viewer_service.py:/app/image_viewer_service.py:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - PYTHONPATH=/host-fvdb/lib/python3.12/site-packages
      - PATH=/host-fvdb/bin:/usr/local/cuda-13.0/bin:/usr/local/bin:/usr/bin:/bin
      - LD_LIBRARY_PATH=/host-fvdb/lib/python3.12/site-packages/nvidia/cuda_runtime/lib:/host-fvdb/lib/python3.12/site-packages/nvidia/cublas/lib:/host-fvdb/lib/python3.12/site-packages/nvidia/cudnn/lib:/usr/local/cuda-13.0/lib64
      - MODEL_DIR=/app/models
      - VIEWER_PORT=8085
      - SAM2_SERVICE_URL=http://sam2-segmentation:8004
      - TRAINING_SERVICE_URL=http://fvdb-training-gpu:8000
      - RENDERING_SERVICE_URL=http://fvdb-rendering:8001
      - OLLAMA_URL=http://ollama:11434
    command: ["python3", "/app/image_viewer_service.py"]
    restart: unless-stopped
    depends_on:
      - training-service
      - rendering-service
      - ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - workflow-net

  # ===========================================================================
  # GARFIELD SERVICE - 3D Object Extraction using Hierarchical Grouping
  # Swagger: http://localhost:8006/docs
  # ===========================================================================
  garfield-service:
    build:
      context: ./garfield-service
      dockerfile: Dockerfile
    image: garfield-service:latest
    container_name: garfield-extraction
    ports:
      - "8006:8006"
    volumes:
      - ./models:/app/models:ro
      - ./garfield-data/outputs:/app/outputs
      - ./garfield-data/cache:/app/cache
      - ./garfield-service/garfield_service.py:/app/garfield_service.py:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - CUDA_VISIBLE_DEVICES=0
      - TORCH_HOME=/app/cache
      - MODEL_DIR=/app/models
      - OUTPUT_DIR=/app/outputs
      - GARFIELD_PORT=8006
      - VIEWER_SERVICE_URL=http://fvdb-viewer:8085
    runtime: nvidia
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - workflow-net

  # ===========================================================================
  # SVO TO ROSBAG CONVERTER - ZED X stereo camera SVO to ROSBAG
  # Swagger: http://localhost:8009/api
  # ===========================================================================
  svo-converter:
    build:
      context: ./isaac-rosbag-service
      dockerfile: Dockerfile
    image: svo-rosbag-converter:latest
    container_name: svo-converter
    ports:
      - "8009:8009"
    volumes:
      - ./isaac-data/svo-uploads:/app/uploads
      - ./isaac-data/rosbags:/app/outputs
      - ./isaac-data/processing:/app/processing
      - ./isaac-rosbag-service/svo_converter_service.py:/app/svo_converter_service.py:ro
    environment:
      - UPLOAD_DIR=/app/uploads
      - OUTPUT_DIR=/app/outputs
      - PROCESSING_DIR=/app/processing
      - PORT=8009
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8009/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - workflow-net

  # ===========================================================================
  # ISAAC SIM SERVICE - Robotics simulation on NVIDIA Omniverse
  # Swagger: http://localhost:8010/api
  # ===========================================================================
  isaac-sim:
    build:
      context: ./isaac-sim-service
      dockerfile: Dockerfile
    image: isaac-sim-service:latest
    container_name: isaac-sim
    ports:
      - "8010:8010"
    volumes:
      - ./isaac-data/rosbags:/app/rosbags:ro
      - ./isaac-data/scenes:/app/scenes
      - ./isaac-data/sim-outputs:/app/outputs
      - ./isaac-sim-service/isaac_sim_service.py:/app/isaac_sim_service.py:ro
    environment:
      - ROSBAG_DIR=/app/rosbags
      - SCENE_DIR=/app/scenes
      - OUTPUT_DIR=/app/outputs
      - PORT=8010
    restart: unless-stopped
    depends_on:
      - svo-converter
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - workflow-net

  # ===========================================================================
  # ISAAC LAB SERVICE - Reinforcement learning for robotics
  # Swagger: http://localhost:8011/api
  # ===========================================================================
  isaac-lab:
    build:
      context: ./isaac-lab-service
      dockerfile: Dockerfile
    image: isaac-lab-service:latest
    container_name: isaac-lab
    ports:
      - "8011:8011"
    volumes:
      - ./isaac-data/checkpoints:/app/checkpoints
      - ./isaac-data/logs:/app/logs
      - ./isaac-data/lab-outputs:/app/outputs
      - ./isaac-lab-service/isaac_lab_service.py:/app/isaac_lab_service.py:ro
    environment:
      - CHECKPOINT_DIR=/app/checkpoints
      - LOG_DIR=/app/logs
      - OUTPUT_DIR=/app/outputs
      - PORT=8011
    restart: unless-stopped
    depends_on:
      - isaac-sim
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - workflow-net

  # ===========================================================================
  # ISAAC VIEWER - SVO to Gaussian Splat workflow
  # Swagger: http://localhost:8012/api
  # ===========================================================================
  isaac-viewer:
    build:
      context: ./isaac-viewer
      dockerfile: Dockerfile
    image: isaac-viewer:latest
    container_name: isaac-viewer
    ports:
      - "8012:8012"
    volumes:
      - ./isaac-data/svo-uploads:/app/svo
      - ./isaac-data/rosbags:/app/rosbags
      - ./isaac-data/viewer-outputs:/app/outputs
      - ./isaac-data/frames:/app/frames
      - ./isaac-viewer/isaac_viewer_service.py:/app/isaac_viewer_service.py:ro
    environment:
      - SVO_DIR=/app/svo
      - ROSBAG_DIR=/app/rosbags
      - OUTPUT_DIR=/app/outputs
      - FRAME_DIR=/app/frames
      - PORT=8012
      - COLMAP_SERVICE_URL=http://host.docker.internal:8003
      - TRAINING_SERVICE_URL=http://host.docker.internal:8000
      - FVDB_VIEWER_URL=http://host.docker.internal:8085
      - DEPTH_SERVICE_URL=http://host.docker.internal:8013
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      - svo-converter
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8012/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - workflow-net

  # ===========================================================================
  # OLLAMA LLM SERVICE - Local LLM for RAG queries
  # ===========================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-llm
    runtime: nvidia
    ports:
      - "11435:11434"
    volumes:
      - ./ollama-data:/root/.ollama
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - workflow-net

  # ===========================================================================
  # OLLAMA MODEL PULLER - Downloads nemotron-mini on first run
  # ===========================================================================
  ollama-pull:
    image: curlimages/curl:latest
    container_name: ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c 'echo "Pulling nemotron-mini model..." &&
             curl -s http://ollama:11434/api/pull -d "{\"name\":\"nemotron-mini\"}" &&
             echo "Model pull complete"'
    restart: "no"
    networks:
      - workflow-net

  # ===========================================================================
  # STREAMING SERVER - WebRTC Real-time 3D Streaming
  # Web UI: http://localhost:8090/test
  # ===========================================================================
  streaming-server:
    image: omniverse-streaming-server:latest
    container_name: streaming-server
    network_mode: "host"
    volumes:
      - ./models:/app/models
      - ./streaming-server/streaming_server.py:/app/streaming_server.py:ro
      - ./streaming-server/workflow.html:/app/workflow.html:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ===========================================================================
  # TRELLIS.2 - Image-to-3D Reconstruction (Segmented Gaussians → GLB Mesh)
  # Viewer: http://localhost:8013/viewer/{job_id}
  # Swagger: http://localhost:8013/api
  # ===========================================================================
  trellis-service:
    build:
      context: ./trellis-service
      dockerfile: Dockerfile
      args:
        - HF_TOKEN=${HF_TOKEN}
    image: trellis-service:latest
    container_name: trellis-reconstructor
    ports:
      - "8013:8013"
    volumes:
      - ./trellis-service/trellis_service.py:/app/trellis_service.py:ro
      - ./trellis-service/static:/app/static:ro
      - ./trellis-data/outputs:/app/outputs
      - ./trellis-data/cache:/app/cache
      # model_cache not mounted - models baked into image at build time
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - TRELLIS_PORT=8013
      - HF_HOME=/app/model_cache
      - HF_TOKEN=${HF_TOKEN}
      - ATTN_BACKEND=xformers
    runtime: nvidia
    shm_size: '8gb'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8013/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - workflow-net

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  workflow-net:
    driver: bridge
    name: fvdb-workflow-net

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  colmap-data:
  sam2-data:
  garfield-data:
  models:
  outputs:
  cache:
