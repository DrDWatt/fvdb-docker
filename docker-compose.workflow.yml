services:
  # cuVSLAM Processing Service (replaces COLMAP for stereo visual SLAM)
  cuvslam-service:
    build:
      context: ./cuvslam-service
      dockerfile: Dockerfile
    image: cuvslam-service:latest
    container_name: colmap-processor
    runtime: nvidia
    # Keep-alive 120s for large file uploads (2GB+) over slow networks
    command: ["uvicorn", "cuvslam_service:app", "--host", "0.0.0.0", "--port", "8003", "--timeout-keep-alive", "120"]
    ports:
      - "8003:8003"
    volumes:
      - ./colmap-data/uploads:/app/uploads
      - ./colmap-data/processing:/app/processing
      - ./colmap-data/outputs:/app/outputs
      - ./colmap-data/temp:/app/temp
      # Mount service code for live updates
      - ./cuvslam-service/cuvslam_service.py:/app/cuvslam_service.py:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - TRAINING_SERVICE_URL=http://fvdb-training-gpu:8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 10s
    networks:
      - workflow-net

  # Training Service (GPU-enabled)
  training-service:
    image: fvdb-training-gpu:latest
    container_name: fvdb-training-gpu
    runtime: nvidia
    command: ["python3", "-m", "uvicorn", "training_service:app", "--host", "0.0.0.0", "--port", "8000"]
    shm_size: '8gb'
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - CUDA_VISIBLE_DEVICES=0
      - PYTHONPATH=/fvdb-reality-capture:/host-fvdb/lib/python3.12/site-packages:/app
      - PATH=/host-fvdb/bin:/usr/local/cuda-13.0/bin:/usr/local/bin:/usr/bin:/bin
      - LD_LIBRARY_PATH=/host-fvdb/lib/python3.12/site-packages/nvidia/cuda_runtime/lib:/host-fvdb/lib/python3.12/site-packages/nvidia/cublas/lib:/host-fvdb/lib/python3.12/site-packages/nvidia/cudnn/lib:/usr/local/cuda-13.0/lib64:/usr/local/nvidia/lib:/usr/local/nvidia/lib64
      - CUDA_HOME=/usr/local/cuda-13.0
      - TORCH_CUDA_ARCH_LIST=12.1
      - UCX_TLS=^dc,ud
      - UCX_ERROR_SIGNALS=
      # SSL settings - use system certs, disable verification only if needed
      - SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt
      - REQUESTS_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt
      - CURL_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt
      # Torch hub cache for pretrained models
      - TORCH_HOME=/app/.cache/torch
    ports:
      - "8000:8000"
    volumes:
      # Mount host fVDB conda environment
      - /home/dwatkins3/miniforge3/envs/fvdb:/host-fvdb:ro
      # Mount fvdb-reality-capture source
      - /home/dwatkins3/fvdb-reality-capture:/fvdb-reality-capture:ro
      # Mount CUDA 13.0 from host
      - /usr/local/cuda-13.0:/usr/local/cuda-13.0:ro
      # SHARED: COLMAP outputs become training data
      - ./colmap-data/outputs:/app/data
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
      - ./models:/app/models
      - ./cache/torch:/app/.cache/torch
      - ./cache/weights:/app/cache/weights
      # Training service code
      - ./training-service/training_service.py:/app/training_service.py:ro
      - ./training-service/train_subprocess.py:/app/train_subprocess.py:ro
      - ./training-service/clean_gaussians.py:/app/clean_gaussians.py:ro
      - ./training-service/extract_frames.py:/app/extract_frames.py:ro
      - ./training-service/static:/app/static:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 2s
    networks:
      - workflow-net

  # Rendering Service
  rendering-service:
    image: fvdb-rendering-minimal:latest
    container_name: fvdb-rendering
    ports:
      - "8001:8001"
    volumes:
      - ./models:/app/models
      - ./rendering-service/rendering_service_clean.py:/app/rendering_service.py:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 2s
    networks:
      - workflow-net

  # USD Pipeline Service
  usd-pipeline:
    image: fvdb-docker-usd-pipeline:latest
    container_name: usd-pipeline
    ports:
      - "8002:8002"
    volumes:
      - ./models:/app/models
      - ./usd-outputs:/app/outputs
    restart: unless-stopped
    networks:
      - workflow-net

  # Streaming Server (Workflow UI)
  streaming-server:
    image: omniverse-streaming-server:latest
    container_name: streaming-server
    network_mode: "host"
    volumes:
      - ./models:/app/models
      - ./streaming-server/workflow.html:/app/workflow.html:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 2s

  # SAM-2 Segmentation Service (GPU-accelerated object segmentation)
  sam2-service:
    build:
      context: ./sam2-service
      dockerfile: Dockerfile
    image: sam2-service:latest
    container_name: sam2-segmentation
    ports:
      - "8004:8004"
    volumes:
      - ./sam2-data/uploads:/app/uploads
      - ./sam2-data/outputs:/app/outputs
      - ./sam2-data/models:/app/models/sam2
      - ./sam2-data/cache:/app/cache
      - ./models:/app/splat-models:ro
      - ./sam2-service/sam2_service.py:/app/sam2_service.py:ro
      - ./sam2-service/static:/app/static:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - CUDA_VISIBLE_DEVICES=0
      - TORCH_HOME=/app/cache
      - SAM2_CHECKPOINT_DIR=/app/models/sam2
      - VIEWER_SERVICE_URL=http://fvdb-viewer:8085
      - TRAINING_SERVICE_URL=http://fvdb-training-gpu:8000
      - RENDERING_SERVICE_URL=http://fvdb-rendering:8001
    runtime: nvidia
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - workflow-net

  # Ollama LLM Service (for RAG queries)
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-llm
    runtime: nvidia
    ports:
      - "11435:11434"
    volumes:
      - ./ollama-data:/root/.ollama
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - workflow-net

  # Ollama model puller (runs once to pre-download nemotron-mini)
  ollama-pull:
    image: curlimages/curl:latest
    container_name: ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c 'echo "Pulling nemotron-mini model..." &&
             curl -s http://ollama:11434/api/pull -d "{\"name\":\"nemotron-mini\"}" &&
             echo "Model pull complete"'
    restart: "no"
    networks:
      - workflow-net

  # fVDB Image-based Viewer (renders to PNG, no Vulkan video encoding needed)
  fvdb-viewer:
    image: fvdb-training-gpu:latest
    container_name: fvdb-viewer
    runtime: nvidia
    ports:
      - "8085:8085"
    volumes:
      - /home/dwatkins3/miniforge3/envs/fvdb:/host-fvdb:ro
      - /usr/local/cuda-13.0:/usr/local/cuda-13.0:ro
      - ./models:/app/models
      - ./sam2-data/models:/app/sam2-models:ro
      - ./fvdb-viewer/image_viewer_service.py:/app/image_viewer_service.py:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - PYTHONPATH=/host-fvdb/lib/python3.12/site-packages
      - PATH=/host-fvdb/bin:/usr/local/cuda-13.0/bin:/usr/local/bin:/usr/bin:/bin
      - LD_LIBRARY_PATH=/host-fvdb/lib/python3.12/site-packages/nvidia/cuda_runtime/lib:/host-fvdb/lib/python3.12/site-packages/nvidia/cublas/lib:/host-fvdb/lib/python3.12/site-packages/nvidia/cudnn/lib:/usr/local/cuda-13.0/lib64
      - MODEL_DIR=/app/models
      - VIEWER_PORT=8085
      - OLLAMA_URL=http://ollama:11434
      - TORCH_CUDA_ARCH_LIST=12.0
      - CUDA_HOME=/usr/local/cuda-13.0
    command: ["python3", "/app/image_viewer_service.py"]
    restart: unless-stopped
    depends_on:
      - training-service
      - ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - workflow-net

networks:
  workflow-net:
    driver: bridge

volumes:
  colmap-data:
  training-data:
